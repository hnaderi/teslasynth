<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Teslasynth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#13171f" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <script>
    if ('serviceWorker' in navigator && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      // Remove the old COI-only SW if still registered
      navigator.serviceWorker.getRegistrations().then(regs => {
        for (const r of regs)
          if (r.active?.scriptURL.includes('coi-serviceworker')) r.unregister();
      });
      navigator.serviceWorker.register('/sw.js').then(() => {
        if (!crossOriginIsolated) location.reload();
      });
    }
  </script>
</head>
<body>
  <main class="container">
    <div id="app"></div>
  </main>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
