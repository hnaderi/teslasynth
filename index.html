  <meta charset="UTF-8" />
  <title>Teslasynth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#13171f" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <script>
    if ('serviceWorker' in navigator && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      // Remove the old COI-only SW if still registered
      navigator.serviceWorker.getRegistrations().then(regs => {
        for (const r of regs)
          if (r.active?.scriptURL.includes('coi-serviceworker')) r.unregister();
      });
      navigator.serviceWorker.register('/sw.js');
      // Reload once when the SW first takes control so COI headers are active.
      // Using controllerchange (not register().then) avoids an infinite reload loop:
      // register() resolves on every page load, but controllerchange only fires
      // when the SW actually activates and claims the page.
      if (!crossOriginIsolated)
        navigator.serviceWorker.addEventListener('controllerchange', () => location.reload(), { once: true });
    }
  </script>
  <script type="module" crossorigin src="/assets/index-BQteotQc.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CV4DMjdj.css">
</head>
